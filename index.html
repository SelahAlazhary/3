<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إختبارات سلاح الأزهري - نظام الاختبارات الإلكترونية</title>
    <meta name="description" content="نظام متكامل للاختبارات الإلكترونية لطلبة الأزهر الشريف">
    <meta name="keywords" content="اختبارات, الأزهر, تعليم, اختبارات إلكترونية, سلاح الأزهري">
    <meta name="author" content="إختبارات سلاح الأزهري">
    <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhdyuIMWOk4qbKO_qCaKOHo859JMs3To_OJjpQ8u5fU0ULewA-AdNp7Izuv9PUOIOTGTUsNM6DTVVbRWKe2OEDTBcHnxOnOrCylsq_V3YhUFPqTkPJ7XOuzWzbCXKW-UnoLEwqsE8XjaHiWPZu2dC_pESia4uQOATzelupKDAUbuO1_jH2003wsgUO0PPiO/s1080/Selah%20Elazhary%20Transperant%20logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --primary-dark: #3a0ca3;
            --secondary: #7209b7;
            --success: #4cc9f0;
            --success-light: #4895ef;
            --danger: #f72585;
            --danger-light: #b5179e;
            --warning: #f8961e;
            --warning-light: #f9c74f;
            --light: #f8f9fa;
            --light-2: #e9ecef;
            --light-3: #dee2e6;
            --dark: #212529;
            --dark-2: #343a40;
            --dark-3: #495057;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-tertiary: #adb5bd;
            --card-bg: #ffffff;
            --card-bg-dark: #1e1e1e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
            --gradient-primary: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --gradient-secondary: linear-gradient(135deg, #7209b7 0%, #560bad 100%);
            --gradient-success: linear-gradient(135deg, #4cc9f0 0%, #4895ef 100%);
            --gradient-danger: linear-gradient(135deg, #f72585 0%, #b5179e 100%);
            --gradient-warning: linear-gradient(135deg, #f8961e 0%, #f9c74f 100%);
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #7c3aed;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --danger-light: #f87171;
            --warning: #f59e0b;
            --warning-light: #fbbf24;
            --light: #1e293b;
            --light-2: #334155;
            --light-3: #475569;
            --dark: #f8fafc;
            --dark-2: #e2e8f0;
            --dark-3: #cbd5e1;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --card-bg: #1e293b;
            --card-bg-dark: #0f172a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4);
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --gradient-secondary: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', -apple-system, 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7ec 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
            transition: background-color 0.3s ease;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* إخفاء جميع شاشات التنقل بشكل افتراضي */
        #year-selection-container,
        #section-selection-container,
        #subject-selection-container,
        #lesson-selection-container,
        #sublesson-selection-container {
            display: none !important;
        }

        /* تنسيقات شاشات التنقل */
        .section-grid, .lesson-grid, .sublesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .section-card, .subject-card, .lesson-card, .sublesson-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .section-card::before, .subject-card::before, .lesson-card::before, .sublesson-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
        }

        .section-card:hover, .subject-card:hover, .lesson-card:hover, .sublesson-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-8px);
            border-color: var(--primary-light);
        }

        .section-card i, .subject-card i, .lesson-card i, .sublesson-card i {
            font-size: 48px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: var(--transition);
        }

        .section-card h3, .subject-card h3, .lesson-card h3, .sublesson-card h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .section-card p, .subject-card p, .lesson-card p, .sublesson-card p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
        }

        .section-card.selected, .subject-card.selected, .lesson-card.selected, .sublesson-card.selected {
            background: var(--gradient-primary);
            color: white;
            transform: scale(1.02);
        }

        .section-card.selected i, .subject-card.selected i, .lesson-card.selected i, .sublesson-card.selected i,
        .section-card.selected p, .subject-card.selected p, .lesson-card.selected p, .sublesson-card.selected p {
            color: white;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* شاشة التحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            color: white;
            transition: opacity 0.3s ease;
        }

        .loading-logo {
            width: 180px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* تنسيقات الاختبارات */
        .quiz-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 30px;
            animation: slideUp 0.4s ease-out;
        }

        .quiz-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-3);
        }

        .quiz-header h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            text-align: center;
        }

        .timer {
            display: none !important;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background-color: var(--light-3);
            border-radius: 4px;
            margin-top: 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient-primary);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.65, 0, 0.35, 1);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shine 2s infinite;
        }

        .question {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(67, 97, 238, 0.03);
            border-radius: var(--radius);
            border-right: 4px solid var(--primary);
        }

        [data-theme="dark"] .question {
            background: rgba(99, 102, 241, 0.05);
        }

        .question h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.6;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .question-number {
            display: inline-flex;
            min-width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            color: white;
            border-radius: 12px;
            text-align: center;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 8px;
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
            font-size: 1.1rem;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .option {
            padding: 18px 20px;
            border: 1px solid var(--light-3);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            display: flex;
            align-items: center;
            background: var(--card-bg);
        }

        .option:hover {
            background-color: rgba(67, 97, 238, 0.05);
            border-color: var(--primary-light);
            transform: translateX(4px);
        }

        [data-theme="dark"] .option:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }

        .option.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-dark);
        }

        .option.correct {
            background-color: rgba(76, 201, 240, 0.1);
            border-color: var(--success);
            color: var(--text-primary);
        }

        .option.incorrect {
            background-color: rgba(247, 37, 133, 0.1);
            border-color: var(--danger);
            color: var(--text-primary);
        }

        .option-icon {
            margin-right: auto;
            opacity: 0;
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .option.selected .option-icon,
        .option.correct .option-icon,
        .option.incorrect .option-icon {
            opacity: 1;
        }

        .option.correct .option-icon {
            color: var(--success);
        }

        .option.incorrect .option-icon {
            color: var(--danger);
        }

        .true-false-options {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }

        .true-false-btn {
            flex: 1;
            padding: 18px;
            border: 1px solid var(--light-3);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--card-bg);
            font-weight: 600;
        }

        .true-false-btn:hover {
            background-color: rgba(67, 97, 238, 0.05);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        [data-theme="dark"] .true-false-btn:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }

        .true-false-btn.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-dark);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 16px;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
        }

        [data-theme="dark"] .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background-color: var(--light-2);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--light-3);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-success {
            background: var(--gradient-success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-light);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 201, 240, 0.3);
        }

        .btn-danger {
            background: var(--gradient-danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-light);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(247, 37, 133, 0.3);
        }

        .btn-warning {
            background: var(--gradient-warning);
            color: white;
        }

        .btn-warning:hover {
            background: var(--warning-light);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(248, 150, 30, 0.3);
        }

        .btn-sm {
            padding: 12px 20px;
            font-size: 0.9rem;
        }

        .results-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 30px;
            display: none;
            text-align: center;
            animation: scaleIn 0.4s ease-out;
        }

        .results-container h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: var(--light);
            border-radius: var(--radius);
            padding: 24px 20px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid var(--light-3);
        }

        .stat-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            line-height: 1;
        }

        .stat-label {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .feedback {
            text-align: right;
            margin-bottom: 30px;
            background: var(--light);
            padding: 24px;
            border-radius: var(--radius);
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--light-3);
        }

        .feedback h3 {
            margin-bottom: 20px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.3rem;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--primary-light);
        }

        .feedback ul {
            list-style-type: none;
        }

        .feedback li {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-3);
            animation: fadeIn 0.4s ease-out;
        }

        .feedback li:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .ad-container {
            background: var(--gradient-warning);
            color: white;
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .ad-container h3 {
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .ad-container p {
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .ad-close {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .ad-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .fa-medal {
            font-size: 28px;
            margin-right: 8px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        
        .gold {
            color: #FFD700;
        }
        
        .silver {
            color: #C0C0C0;
        }
        
        .bronze {
            color: #CD7F32;
        }

        .btn-3d {
            transform-style: preserve-3d;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-3d:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 10px 20px rgba(67, 97, 238, 0.25),
                0 5px 10px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .btn-3d:hover {
            box-shadow: 
                0 10px 20px rgba(99, 102, 241, 0.3),
                0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .btn-3d:active {
            transform: translateY(2px) scale(0.98);
        }

        /* رسالة خطأ */
        .error-message {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin: 20px 0;
        }

        .error-message i {
            font-size: 64px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .error-message h3 {
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .error-message p {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* عنوان الصفحة */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        @media (max-width: 768px) {
            .section-grid, .lesson-grid, .sublesson-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .true-false-options {
                flex-direction: column;
            }
            
            .navigation {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes scaleIn {
            from { 
                opacity: 0;
                transform: scale(0.9);
            }
            to { 
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        [data-theme="dark"] ::-webkit-scrollbar-track {
            background: #334155;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDo2v1boaj3i5C8SC1AZzEUFd3OqvXfiqs",
        authDomain: "selahelazhary-67792.firebaseapp.com",
        databaseURL: "https://selahelazhary-67792-default-rtdb.firebaseio.com",
        projectId: "selahelazhary-67792",
        storageBucket: "selahelazhary-67792",
        messagingSenderId: "235914603020",
        appId: "1:235914603020:web:e47c2edb9ab4534f3e9c29",
        measurementId: "G-ZW3E2Z04QF"
    };
    
    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // متغيرات التطبيق
    let currentQuestionIndex = 0;
    let score = 0;
    let questions = [];
    let userAnswers = [];
    let categories = new Set();
    let quizStartTime;
    let selectedYear = '';
    let selectedSection = '';
    let selectedSubject = '';
    let selectedLesson = '';
    let selectedSublesson = '';
    let subjects = [];
    let sections = [];
    let lessons = [];
    let sublessons = [];
    let currentAd = JSON.parse(localStorage.getItem('currentAd')) || null;

    // عناصر DOM
    const elements = {
        initialLoading: document.getElementById('initial-loading'),
        contentLoading: document.getElementById('content-loading'),
        sectionContainer: document.getElementById('section-selection-container'),
        subjectContainer: document.getElementById('subject-selection-container'),
        lessonContainer: document.getElementById('lesson-selection-container'),
        sublessonContainer: document.getElementById('sublesson-selection-container'),
        quizContainer: document.getElementById('quiz-container'),
        resultsContainer: document.getElementById('results-container'),
        sectionGrid: document.getElementById('section-container'),
        subjectGrid: document.getElementById('subject-container'),
        lessonGrid: document.getElementById('lesson-container'),
        sublessonGrid: document.getElementById('sublesson-container'),
        sectionTitle: document.getElementById('section-title'),
        subjectTitle: document.getElementById('subject-title'),
        lessonTitle: document.getElementById('lesson-title'),
        sublessonTitle: document.getElementById('sublesson-title'),
        quizTitle: document.getElementById('quiz-title'),
        questionContainer: document.getElementById('question-container'),
        progressBar: document.getElementById('progress-bar'),
        nextBtn: document.getElementById('next-btn'),
        prevBtn: document.getElementById('prev-btn'),
        submitBtn: document.getElementById('submit-btn'),
        restartBtn: document.getElementById('restart-btn'),
        categoryFilter: document.getElementById('category-filter'),
        categorySelect: document.getElementById('category-select'),
        scoreDisplay: document.getElementById('score-value'),
        percentageDisplay: document.getElementById('percentage'),
        timeTakenDisplay: document.getElementById('time-taken'),
        feedbackDisplay: document.getElementById('feedback'),
        adContainer: document.getElementById('ad-container'),
        adClose: document.getElementById('ad-close'),
        adTitle: document.getElementById('ad-title'),
        adDescription: document.getElementById('ad-description'),
        adAction: document.getElementById('ad-action')
    };

    // تهيئة التطبيق
    function initApp() {
        try {
            // التحقق من وجود parameters في URL
            const urlParams = new URLSearchParams(window.location.search);
            const sectionId = urlParams.get('section');
            const subjectId = urlParams.get('subject');
            const lessonId = urlParams.get('lesson');
            const sublessonId = urlParams.get('sublesson');
            
            if (sectionId || subjectId || lessonId || sublessonId) {
                console.log('تم العثور على رابط مباشر:', { sectionId, subjectId, lessonId, sublessonId });
                
                // تحميل البيانات الأساسية أولاً
                loadBaseData(sectionId, subjectId, lessonId, sublessonId);
            } else {
                // إذا لم يوجد parameters، نعرض رسالة خطأ
                setTimeout(() => {
                    elements.initialLoading.style.display = 'none';
                    showError('الرابط غير صحيح. الرجاء استخدام رابط صحيح.');
                }, 2000);
            }
            
            // تحميل الإعلان
            loadAd();
            
            // إضافة مستمع لإغلاق الإعلان
            if (elements.adClose) {
                elements.adClose.addEventListener('click', function() {
                    elements.adContainer.style.display = 'none';
                });
            }
            
            // إضافة مستمع لزر الإعلان
            if (elements.adAction) {
                elements.adAction.addEventListener('click', function() {
                    if (currentAd && currentAd.url) {
                        window.open(currentAd.url, '_blank');
                    }
                });
            }
            
            // إضافة مستمعين لأزرار الاختبارات
            elements.nextBtn.addEventListener('click', nextQuestion);
            elements.prevBtn.addEventListener('click', prevQuestion);
            elements.submitBtn.addEventListener('click', submitQuiz);
            elements.restartBtn.addEventListener('click', restartQuiz);
            
            // إضافة مستمع لتصفية التصنيفات
            elements.categorySelect.addEventListener('change', function() {
                filterQuestionsByCategory(this.value);
            });
            
        } catch (error) {
            console.error('خطأ في تهيئة التطبيق:', error);
            showError('حدث خطأ في تهيئة التطبيق');
        }
    }
    
    // تحميل البيانات الأساسية
    function loadBaseData(sectionId, subjectId, lessonId, sublessonId) {
        try {
            // إخفاء شاشة التحميل الأولية
            elements.initialLoading.style.display = 'none';
            
            // إظهار شاشة تحميل المحتوى
            elements.contentLoading.style.display = 'flex';
            
            // تحميل الأقسام أولاً
            const sectionsRef = database.ref('sections');
            sectionsRef.once('value', (snapshot) => {
                sections = [];
                snapshot.forEach((childSnapshot) => {
                    const section = childSnapshot.val();
                    section.id = childSnapshot.key;
                    sections.push(section);
                });
                
                console.log('تم تحميل الأقسام:', sections.length);
                
                // تحميل المواد
                const subjectsRef = database.ref('subjects');
                subjectsRef.once('value', (snapshot) => {
                    subjects = [];
                    snapshot.forEach((childSnapshot) => {
                        const subject = childSnapshot.val();
                        subject.id = childSnapshot.key;
                        subjects.push(subject);
                    });
                    
                    console.log('تم تحميل المواد:', subjects.length);
                    
                    // تحميل الدروس
                    const lessonsRef = database.ref('lessons');
                    lessonsRef.once('value', (snapshot) => {
                        lessons = [];
                        snapshot.forEach((childSnapshot) => {
                            const lesson = childSnapshot.val();
                            lesson.id = childSnapshot.key;
                            lessons.push(lesson);
                        });
                        
                        console.log('تم تحميل الدروس:', lessons.length);
                        
                        // تحميل الأقسام الفرعية
                        const sublessonsRef = database.ref('sublessons');
                        sublessonsRef.once('value', (snapshot) => {
                            sublessons = [];
                            snapshot.forEach((childSnapshot) => {
                                const sublesson = childSnapshot.val();
                                sublesson.id = childSnapshot.key;
                                sublessons.push(sublesson);
                            });
                            
                            console.log('تم تحميل الأقسام الفرعية:', sublessons.length);
                            
                            // بعد تحميل كل البيانات، نوجه المستخدم للمكان الصحيح
                            navigateToTarget(sectionId, subjectId, lessonId, sublessonId);
                        });
                    });
                });
            });
        } catch (error) {
            console.error('خطأ في تحميل البيانات الأساسية:', error);
            elements.contentLoading.style.display = 'none';
            showError('حدث خطأ في تحميل البيانات');
        }
    }
    
    // توجيه المستخدم للمكان الصحيح
    function navigateToTarget(sectionId, subjectId, lessonId, sublessonId) {
        try {
            // إخفاء جميع الشاشات أولاً
            hideAllScreens();
            
            if (sublessonId) {
                // تم توجيه الرابط لقسم فرعي
                const sublesson = sublessons.find(s => s.id === sublessonId);
                if (sublesson) {
                    selectedSublesson = sublessonId;
                    selectedLesson = sublesson.lessonId;
                    
                    const lesson = lessons.find(l => l.id === selectedLesson);
                    if (lesson) {
                        selectedSubject = lesson.subjectId;
                        
                        const subject = subjects.find(s => s.id === selectedSubject);
                        if (subject) {
                            selectedSection = subject.sectionId;
                            
                            const section = sections.find(s => s.id === selectedSection);
                            if (section && section.grades && section.grades.length > 0) {
                                selectedYear = section.grades[0];
                                
                                // عرض شاشة الأقسام الفرعية
                                elements.sublessonTitle.textContent = sublesson.name;
                                loadSublessonsForLesson(selectedLesson, true);
                            }
                        }
                    }
                } else {
                    showError('القسم الفرعي المطلوب غير موجود');
                }
            }
            else if (lessonId) {
                // تم توجيه الرابط لدرس
                const lesson = lessons.find(l => l.id === lessonId);
                if (lesson) {
                    selectedLesson = lessonId;
                    selectedSubject = lesson.subjectId;
                    
                    const subject = subjects.find(s => s.id === selectedSubject);
                    if (subject) {
                        selectedSection = subject.sectionId;
                        
                        const section = sections.find(s => s.id === selectedSection);
                        if (section && section.grades && section.grades.length > 0) {
                            selectedYear = section.grades[0];
                            
                            // عرض شاشة الدروس
                            elements.lessonTitle.textContent = lesson.name;
                            loadLessonsForSubject(selectedSubject, true);
                        }
                    }
                } else {
                    showError('الدرس المطلوب غير موجود');
                }
            }
            else if (subjectId) {
                // تم توجيه الرابط لمادة
                const subject = subjects.find(s => s.id === subjectId);
                if (subject) {
                    selectedSubject = subjectId;
                    selectedSection = subject.sectionId;
                    
                    const section = sections.find(s => s.id === selectedSection);
                    if (section && section.grades && section.grades.length > 0) {
                        selectedYear = section.grades[0];
                        
                        // عرض شاشة المواد
                        elements.subjectTitle.textContent = subject.name;
                        loadSubjectsForSection(selectedSection, true);
                    }
                } else {
                    showError('المادة المطلوبة غير موجودة');
                }
            }
            else if (sectionId) {
                // تم توجيه الرابط لقسم
                const section = sections.find(s => s.id === sectionId);
                if (section) {
                    selectedSection = sectionId;
                    
                    if (section.grades && section.grades.length > 0) {
                        selectedYear = section.grades[0];
                        
                        // عرض شاشة الأقسام
                        elements.sectionTitle.textContent = section.name;
                        loadSectionsForYear(selectedYear, sectionId, true);
                    }
                } else {
                    showError('القسم المطلوب غير موجود');
                }
            }
            
            // إخفاء شاشة تحميل المحتوى
            elements.contentLoading.style.display = 'none';
            
        } catch (error) {
            console.error('خطأ في توجيه المستخدم:', error);
            elements.contentLoading.style.display = 'none';
            showError('حدث خطأ في توجيه المستخدم');
        }
    }
    
    // إخفاء جميع الشاشات
    function hideAllScreens() {
        elements.sectionContainer.style.display = 'none';
        elements.subjectContainer.style.display = 'none';
        elements.lessonContainer.style.display = 'none';
        elements.sublessonContainer.style.display = 'none';
        elements.quizContainer.style.display = 'none';
        elements.resultsContainer.style.display = 'none';
    }
    
    // تحميل الأقسام للصف
    function loadSectionsForYear(year, highlightSectionId, showDirect = false) {
        try {
            elements.sectionGrid.innerHTML = '';
            
            const yearSections = sections.filter(section => 
                section.grades && section.grades.includes(year)
            );
            
            if (yearSections.length > 0) {
                yearSections.forEach(section => {
                    const sectionCard = document.createElement('div');
                    sectionCard.className = 'section-card';
                    if (highlightSectionId && section.id === highlightSectionId) {
                        sectionCard.classList.add('selected');
                    }
                    sectionCard.dataset.section = section.id;
                    
                    sectionCard.innerHTML = `
                        <i class="${section.icon || 'fas fa-layer-group'}"></i>
                        <h3>${section.name}</h3>
                        <p>${section.description || ''}</p>
                    `;
                    
                    sectionCard.addEventListener('click', () => {
                        window.location.href = `?section=${section.id}`;
                    });
                    
                    elements.sectionGrid.appendChild(sectionCard);
                });
                
                if (showDirect) {
                    elements.sectionContainer.style.display = 'block';
                }
            } else {
                elements.sectionGrid.innerHTML = '<div class="error-message">لا توجد أقسام متاحة</div>';
                if (showDirect) {
                    elements.sectionContainer.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('خطأ في تحميل الأقسام:', error);
        }
    }
    
    // تحميل المواد للقسم
    function loadSubjectsForSection(sectionId, showDirect = false) {
        try {
            elements.subjectGrid.innerHTML = '';
            
            const sectionSubjects = subjects.filter(subject => 
                subject.sectionId === sectionId
            );
            
            if (sectionSubjects.length > 0) {
                sectionSubjects.forEach(subject => {
                    const subjectCard = document.createElement('div');
                    subjectCard.className = 'subject-card';
                    subjectCard.dataset.subject = subject.id;
                    
                    subjectCard.innerHTML = `
                        <i class="fas ${subject.icon || 'fa-book'}"></i>
                        <h3>${subject.name}</h3>
                        <p>${subject.description || ''}</p>
                    `;
                    
                    subjectCard.addEventListener('click', () => {
                        window.location.href = `?subject=${subject.id}`;
                    });
                    
                    elements.subjectGrid.appendChild(subjectCard);
                });
                
                if (showDirect) {
                    elements.subjectContainer.style.display = 'block';
                }
            } else {
                // إذا لم توجد مواد، ننتقل مباشرة للاختبارات
                loadQuestions();
                if (showDirect) {
                    elements.quizContainer.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('خطأ في تحميل المواد:', error);
        }
    }
    
    // تحميل الدروس للمادة
    function loadLessonsForSubject(subjectId, showDirect = false) {
        try {
            elements.lessonGrid.innerHTML = '';
            
            const subjectLessons = lessons.filter(lesson => 
                lesson.subjectId === subjectId
            );
            
            if (subjectLessons.length > 0) {
                subjectLessons.sort((a, b) => (a.order || 999) - (b.order || 999));
                
                subjectLessons.forEach(lesson => {
                    const lessonCard = document.createElement('div');
                    lessonCard.className = 'lesson-card';
                    lessonCard.dataset.lesson = lesson.id;
                    
                    lessonCard.innerHTML = `
                        <i class="fas ${lesson.icon || 'fa-book-open'}"></i>
                        <h3>${lesson.name}</h3>
                        <p>${lesson.description || ''}</p>
                    `;
                    
                    lessonCard.addEventListener('click', () => {
                        window.location.href = `?lesson=${lesson.id}`;
                    });
                    
                    elements.lessonGrid.appendChild(lessonCard);
                });
                
                if (showDirect) {
                    elements.lessonContainer.style.display = 'block';
                }
            } else {
                // إذا لم توجد دروس، ننتقل مباشرة للاختبارات
                loadQuestions();
                if (showDirect) {
                    elements.quizContainer.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('خطأ في تحميل الدروس:', error);
        }
    }
    
    // تحميل الأقسام الفرعية للدرس
    function loadSublessonsForLesson(lessonId, showDirect = false) {
        try {
            elements.sublessonGrid.innerHTML = '';
            
            const lessonSublessons = sublessons.filter(sublesson => 
                sublesson.lessonId === lessonId
            );
            
            if (lessonSublessons.length > 0) {
                lessonSublessons.sort((a, b) => (a.order || 999) - (b.order || 999));
                
                lessonSublessons.forEach(sublesson => {
                    const sublessonCard = document.createElement('div');
                    sublessonCard.className = 'sublesson-card';
                    sublessonCard.dataset.sublesson = sublesson.id;
                    
                    sublessonCard.innerHTML = `
                        <i class="fas ${sublesson.icon || 'fa-folder'}"></i>
                        <h3>${sublesson.name}</h3>
                        <p>${sublesson.description || ''}</p>
                    `;
                    
                    sublessonCard.addEventListener('click', () => {
                        window.location.href = `?sublesson=${sublesson.id}`;
                    });
                    
                    elements.sublessonGrid.appendChild(sublessonCard);
                });
                
                if (showDirect) {
                    elements.sublessonContainer.style.display = 'block';
                }
            } else {
                // إذا لم توجد أقسام فرعية، ننتقل مباشرة للاختبارات
                loadQuestions();
                if (showDirect) {
                    elements.quizContainer.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('خطأ في تحميل الأقسام الفرعية:', error);
        }
    }
    
    // تحميل الأسئلة
    function loadQuestions() {
        try {
            elements.contentLoading.style.display = 'flex';
            
            const questionsRef = database.ref('questions');
            questionsRef.once('value', (snapshot) => {
                const allQuestions = [];
                categories = new Set(['all']);
                
                snapshot.forEach((childSnapshot) => {
                    const question = childSnapshot.val();
                    question.id = childSnapshot.key;
                    allQuestions.push(question);
                });
                
                // تصفية الأسئلة حسب المسار المحدد
                questions = allQuestions.filter(q => {
                    const yearMatch = q.year === selectedYear;
                    const sectionMatch = q.section === selectedSection;
                    const subjectMatch = !selectedSubject || q.subject === selectedSubject || !q.subject;
                    const lessonMatch = !selectedLesson || q.lesson === selectedLesson || !q.lesson;
                    const sublessonMatch = !selectedSublesson || q.sublesson === selectedSublesson || !q.sublesson;
                    
                    if (yearMatch && sectionMatch && subjectMatch && lessonMatch && sublessonMatch && q.category) {
                        categories.add(q.category);
                    }
                    
                    return yearMatch && sectionMatch && subjectMatch && lessonMatch && sublessonMatch;
                });
                
                updateCategoryFilters();
                
                elements.contentLoading.style.display = 'none';
                
                if (questions.length > 0) {
                    elements.quizContainer.style.display = 'block';
                    startQuiz();
                } else {
                    showNoQuestionsMessage();
                }
            });
        } catch (error) {
            console.error('خطأ في تحميل الأسئلة:', error);
            elements.contentLoading.style.display = 'none';
            showError('حدث خطأ في تحميل الأسئلة');
        }
    }
    
    // تحديث قوائم التصنيفات
    function updateCategoryFilters() {
        try {
            elements.categorySelect.innerHTML = '';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category === 'all' ? 'جميع التصنيفات' : category;
                elements.categorySelect.appendChild(option);
            });
            
            elements.categoryFilter.style.display = categories.size > 2 ? 'block' : 'none';
        } catch (error) {
            console.error('خطأ في تحديث التصنيفات:', error);
        }
    }
    
    // تصفية الأسئلة حسب التصنيف
    function filterQuestionsByCategory(selectedCategory) {
        if (selectedCategory === 'all') {
            loadQuestions();
            return;
        }
        
        elements.contentLoading.style.display = 'flex';
        
        const questionsRef = database.ref('questions');
        questionsRef.once('value', (snapshot) => {
            const allQuestions = [];
            snapshot.forEach((childSnapshot) => {
                const question = childSnapshot.val();
                question.id = childSnapshot.key;
                
                const yearMatch = question.year === selectedYear;
                const sectionMatch = question.section === selectedSection;
                const subjectMatch = !selectedSubject || question.subject === selectedSubject || !question.subject;
                const lessonMatch = !selectedLesson || question.lesson === selectedLesson || !question.lesson;
                const sublessonMatch = !selectedSublesson || question.sublesson === selectedSublesson || !question.sublesson;
                
                if (yearMatch && sectionMatch && subjectMatch && lessonMatch && sublessonMatch && 
                    question.category === selectedCategory) {
                    allQuestions.push(question);
                }
            });
            
            if (allQuestions.length > 0) {
                questions = allQuestions;
                currentQuestionIndex = 0;
                score = 0;
                userAnswers = Array(questions.length).fill(null);
                showQuestion();
                updateProgressBar();
            } else {
                showNoQuestionsMessage();
            }
            
            elements.contentLoading.style.display = 'none';
        });
    }
    
    // بدء الاختبار
    function startQuiz() {
        try {
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = Array(questions.length).fill(null);
            quizStartTime = new Date();
            showQuestion();
            updateProgressBar();
            elements.resultsContainer.style.display = 'none';
        } catch (error) {
            console.error('خطأ في بدء الاختبار:', error);
        }
    }
    
    // تحديث شريط التقدم
    function updateProgressBar() {
        try {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            elements.progressBar.style.width = `${progress}%`;
        } catch (error) {
            console.error('خطأ في تحديث شريط التقدم:', error);
        }
    }
    
    // عرض السؤال الحالي
    function showQuestion() {
        try {
            if (currentQuestionIndex >= questions.length) {
                submitQuiz();
                return;
            }
            
            const question = questions[currentQuestionIndex];
            let questionHTML = '';
            
            questionHTML += `
                <div class="question">
                    <h3><span class="question-number">${currentQuestionIndex + 1}</span> ${question.text}</h3>
            `;
            
            if (question.type === 'mcq') {
                questionHTML += `<div class="options">`;
                
                for (let i = 1; i <= 4; i++) {
                    const option = question[`option${i}`];
                    if (!option) continue;
                    
                    const isSelected = userAnswers[currentQuestionIndex] === i.toString();
                    questionHTML += `
                        <div class="option ${isSelected ? 'selected' : ''}" data-answer="${i}">
                            ${option}
                            <i class="fas fa-check option-icon"></i>
                        </div>
                    `;
                }
                
                questionHTML += `</div>`;
            } else {
                questionHTML += `
                    <div class="true-false-options">
                        <div class="true-false-btn ${userAnswers[currentQuestionIndex] === 'true' ? 'selected' : ''}" data-answer="true">
                            <i class="fas fa-check"></i> صح
                        </div>
                        <div class="true-false-btn ${userAnswers[currentQuestionIndex] === 'false' ? 'selected' : ''}" data-answer="false">
                            <i class="fas fa-times"></i> خطأ
                        </div>
                    </div>
                `;
            }
            
            questionHTML += `</div>`;
            elements.questionContainer.innerHTML = questionHTML;
            
            if (question.type === 'mcq') {
                const options = document.querySelectorAll('.option');
                options.forEach(option => {
                    option.addEventListener('click', () => {
                        options.forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                        userAnswers[currentQuestionIndex] = option.dataset.answer;
                    });
                });
            } else {
                const trueFalseBtns = document.querySelectorAll('.true-false-btn');
                trueFalseBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        trueFalseBtns.forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        userAnswers[currentQuestionIndex] = btn.dataset.answer;
                    });
                });
            }
            
            elements.prevBtn.disabled = currentQuestionIndex === 0;
            elements.nextBtn.style.display = currentQuestionIndex < questions.length - 1 ? 'flex' : 'none';
            elements.submitBtn.style.display = currentQuestionIndex === questions.length - 1 ? 'flex' : 'none';
        } catch (error) {
            console.error('خطأ في عرض السؤال:', error);
        }
    }
    
    // الانتقال إلى السؤال التالي
    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            showQuestion();
            updateProgressBar();
        }
    }
    
    // العودة إلى السؤال السابق
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuestion();
            updateProgressBar();
        }
    }
    
    // إرسال الاختبار
    function submitQuiz() {
        showResults();
    }
    
    // عرض النتائج
    function showResults() {
        try {
            score = 0;
            let feedbackHTML = '<h3>التصحيح:</h3><ul>';
            
            questions.forEach((question, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = userAnswer === question.correctAnswer;
                
                if (isCorrect) {
                    score++;
                }
                
                feedbackHTML += `<li>
                    <strong>السؤال ${index + 1}:</strong> ${question.text}<br>
                    <span style="color: ${isCorrect ? 'green' : 'red'}">
                        إجابتك: ${formatAnswer(question, userAnswer)} - 
                        ${isCorrect ? 'صحيح' : 'خطأ (الإجابة الصحيحة: ' + formatAnswer(question, question.correctAnswer) + ')'}
                    </span>
                </li><br>`;
            });
            
            feedbackHTML += '</ul>';
            
            elements.quizContainer.style.display = 'none';
            elements.resultsContainer.style.display = 'block';
            elements.scoreDisplay.textContent = score;
            
            const percentage = Math.round((score / questions.length) * 100);
            elements.percentageDisplay.textContent = `${percentage}%`;
            
            let medal = '';
            if (percentage >= 90) {
                medal = '<i class="fas fa-medal gold"></i>';
            } else if (percentage >= 75) {
                medal = '<i class="fas fa-medal silver"></i>';
            } else if (percentage >= 50) {
                medal = '<i class="fas fa-medal bronze"></i>';
            }
            elements.percentageDisplay.innerHTML += ` ${medal}`;
            
            const timeTaken = calculateTimeTaken();
            elements.timeTakenDisplay.textContent = timeTaken;
            elements.feedbackDisplay.innerHTML = feedbackHTML;
            
            saveQuizResult(score, questions.length, timeTaken);
        } catch (error) {
            console.error('خطأ في عرض النتائج:', error);
        }
    }
    
    // حساب الوقت المستغرق
    function calculateTimeTaken() {
        if (!quizStartTime) return '00:00';
        const endTime = new Date();
        const timeDiff = endTime - quizStartTime;
        const minutes = Math.floor(timeDiff / 60000);
        const seconds = Math.floor((timeDiff % 60000) / 1000);
        return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }
    
    // حفظ نتيجة الاختبار
    function saveQuizResult(score, totalQuestions, timeTaken) {
        try {
            const result = {
                score,
                totalQuestions,
                percentage: Math.round((score / totalQuestions) * 100),
                timestamp: new Date().toISOString(),
                timeTaken,
                year: selectedYear,
                section: selectedSection,
                subject: selectedSubject,
                lesson: selectedLesson,
                sublesson: selectedSublesson
            };
            
            const resultsRef = database.ref('quizResults');
            resultsRef.push(result).catch(error => console.error('Error saving quiz result:', error));
        } catch (error) {
            console.error('خطأ في حفظ النتيجة:', error);
        }
    }
    
    // تنسيق الإجابة
    function formatAnswer(question, answer) {
        if (!answer) return 'لم يتم الإجابة';
        if (question.type === 'mcq') {
            return question[`option${answer}`] || answer;
        } else {
            return answer === 'true' ? 'صح' : 'خطأ';
        }
    }
    
    // إعادة الاختبار
    function restartQuiz() {
        elements.quizContainer.style.display = 'block';
        elements.resultsContainer.style.display = 'none';
        currentQuestionIndex = 0;
        userAnswers = Array(questions.length).fill(null);
        startQuiz();
    }
    
    // عرض رسالة عدم وجود اختبارات
    function showNoQuestionsMessage() {
        elements.quizContainer.style.display = 'block';
        elements.questionContainer.innerHTML = `
            <div class="error-message">
                <i class="fas fa-info-circle"></i>
                <h3>لا توجد إختبارات متاحة</h3>
                <p>لا توجد إختبارات متاحة حالياً لهذا القسم.</p>
            </div>
        `;
        elements.nextBtn.style.display = 'none';
        elements.submitBtn.style.display = 'none';
    }
    
    // عرض رسالة خطأ
    function showError(message) {
        elements.quizContainer.style.display = 'block';
        elements.questionContainer.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <h3>خطأ</h3>
                <p>${message}</p>
            </div>
        `;
        elements.nextBtn.style.display = 'none';
        elements.submitBtn.style.display = 'none';
    }
    
    // تحميل الإعلان
    function loadAd() {
        try {
            const adsRef = database.ref('ads');
            adsRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const ad = snapshot.val();
                    if (ad.status === 'active') {
                        currentAd = ad;
                        localStorage.setItem('currentAd', JSON.stringify(ad));
                        displayAd(ad);
                    }
                } else if (currentAd && currentAd.status === 'active') {
                    displayAd(currentAd);
                }
            });
        } catch (error) {
            console.error('خطأ في تحميل الإعلان:', error);
        }
    }
    
    // عرض الإعلان
    function displayAd(ad) {
        if (ad && ad.status === 'active') {
            elements.adTitle.textContent = ad.title;
            elements.adDescription.textContent = ad.description;
            elements.adContainer.style.display = 'block';
            elements.adAction.style.display = ad.url ? 'inline-flex' : 'none';
        }
    }
    
    // بدء التطبيق
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
